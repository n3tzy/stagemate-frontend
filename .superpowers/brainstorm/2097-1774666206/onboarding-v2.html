<h2>동아리 생성 온보딩 — A안 다듬기</h2>
<p class="subtitle">이모지 제거, 추상 아이콘으로 교체한 버전입니다</p>

<div style="display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:4px;margin-top:20px">

  <!-- Step 1 -->
  <div style="min-width:150px">
    <div style="font-size:10px;color:#6750A4;font-weight:700;margin-bottom:6px;text-align:center;letter-spacing:1px">STEP 1</div>
    <div class="mockup">
      <div class="mockup-header" style="font-size:11px;letter-spacing:0.5px">동아리 만들기</div>
      <div class="mockup-body" style="padding:16px;text-align:center">

        <!-- 스텝 인디케이터 -->
        <div style="display:flex;justify-content:center;gap:5px;margin-bottom:18px">
          <div style="width:28px;height:3px;border-radius:2px;background:#6750A4"></div>
          <div style="width:28px;height:3px;border-radius:2px;background:#e0e0e0"></div>
        </div>

        <!-- 추상 아이콘: 동아리/그룹을 나타내는 원형 도형들 -->
        <div style="margin:0 auto 14px;width:56px;height:56px;position:relative">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
            <circle cx="28" cy="28" r="26" fill="#EDE7F6"/>
            <circle cx="20" cy="26" r="7" fill="#9575CD" opacity="0.7"/>
            <circle cx="36" cy="26" r="7" fill="#7E57C2" opacity="0.7"/>
            <circle cx="28" cy="34" r="7" fill="#6750A4" opacity="0.85"/>
          </svg>
        </div>

        <div style="font-size:13px;font-weight:600;margin-bottom:4px">동아리 이름을 정해주세요</div>
        <div style="font-size:11px;color:#aaa;margin-bottom:12px">나중에 변경할 수 없어요</div>
        <input class="mock-input" style="font-size:12px;width:100%;box-sizing:border-box" placeholder="예) 댄스동아리 리듬" />
        <button class="mock-button" style="margin-top:12px;width:100%;background:#6750A4;color:white;border:none;padding:9px;border-radius:10px;font-size:12px;font-weight:600">다음</button>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;padding-top:48px;color:#ccc;font-size:16px">›</div>

  <!-- Step 2 -->
  <div style="min-width:150px">
    <div style="font-size:10px;color:#6750A4;font-weight:700;margin-bottom:6px;text-align:center;letter-spacing:1px">STEP 2</div>
    <div class="mockup">
      <div class="mockup-header" style="font-size:11px;letter-spacing:0.5px">동아리 만들기</div>
      <div class="mockup-body" style="padding:16px;text-align:center">

        <div style="display:flex;justify-content:center;gap:5px;margin-bottom:18px">
          <div style="width:28px;height:3px;border-radius:2px;background:#6750A4"></div>
          <div style="width:28px;height:3px;border-radius:2px;background:#6750A4"></div>
        </div>

        <!-- 사진 업로드 영역: 추상 원형 + 플러스 -->
        <div style="width:68px;height:68px;border-radius:50%;background:#EDE7F6;border:2px dashed #9575CD;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;cursor:pointer">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
            <!-- 추상 카메라: 렌즈 원 + 상단 뷰파인더 사각형 -->
            <rect x="4" y="10" width="24" height="17" rx="4" fill="#9575CD" opacity="0.25"/>
            <rect x="4" y="10" width="24" height="17" rx="4" stroke="#6750A4" stroke-width="1.5"/>
            <circle cx="16" cy="18" r="5" stroke="#6750A4" stroke-width="1.5"/>
            <circle cx="16" cy="18" r="2.5" fill="#6750A4" opacity="0.4"/>
            <rect x="11" y="7" width="6" height="4" rx="2" fill="#6750A4" opacity="0.5"/>
          </svg>
        </div>
        <div style="font-size:12px;color:#6750A4;font-weight:600;margin-bottom:2px">사진 추가</div>
        <div style="font-size:10px;color:#aaa;margin-bottom:14px">나중에 설정해도 돼요</div>
        <button class="mock-button" style="width:100%;background:#6750A4;color:white;border:none;padding:9px;border-radius:10px;font-size:12px;font-weight:600">동아리 만들기</button>
        <button class="mock-button" style="width:100%;background:transparent;color:#aaa;border:none;padding:6px;font-size:11px">건너뛰기</button>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;padding-top:48px;color:#ccc;font-size:16px">›</div>

  <!-- 완료 -->
  <div style="min-width:150px">
    <div style="font-size:10px;color:#43a047;font-weight:700;margin-bottom:6px;text-align:center;letter-spacing:1px">완료</div>
    <div class="mockup">
      <div class="mockup-header" style="font-size:11px;letter-spacing:0.5px">생성 완료</div>
      <div class="mockup-body" style="padding:16px;text-align:center">

        <!-- 추상 완료 일러스트: 원 + 방사형 선들 -->
        <div style="margin:0 auto 12px;width:56px;height:56px">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
            <circle cx="28" cy="28" r="16" fill="#EDE7F6"/>
            <circle cx="28" cy="28" r="12" fill="#7E57C2" opacity="0.3"/>
            <circle cx="28" cy="28" r="7" fill="#6750A4"/>
            <!-- 방사형 선 (완료/빛나는 느낌) -->
            <line x1="28" y1="4"  x2="28" y2="9"  stroke="#6750A4" stroke-width="2" stroke-linecap="round"/>
            <line x1="28" y1="47" x2="28" y2="52" stroke="#6750A4" stroke-width="2" stroke-linecap="round"/>
            <line x1="4"  y1="28" x2="9"  y2="28" stroke="#6750A4" stroke-width="2" stroke-linecap="round"/>
            <line x1="47" y1="28" x2="52" y2="28" stroke="#6750A4" stroke-width="2" stroke-linecap="round"/>
            <line x1="11" y1="11" x2="15" y2="15" stroke="#9575CD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="45" y1="11" x2="41" y2="15" stroke="#9575CD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="11" y1="45" x2="15" y2="41" stroke="#9575CD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="45" y1="45" x2="41" y2="41" stroke="#9575CD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          </svg>
        </div>

        <div style="font-size:13px;font-weight:700;margin-bottom:3px">리듬</div>
        <div style="font-size:11px;color:#888;margin-bottom:12px">동아리가 만들어졌어요</div>
        <div style="background:#f3f0ff;border-radius:10px;padding:10px;font-size:11px;color:#6750A4;line-height:1.8">
          초대코드<br><b style="font-size:15px;letter-spacing:2px">ABC123</b><br>
          <span style="color:#aaa;font-size:10px">멤버에게 공유하세요</span>
        </div>
      </div>
    </div>
  </div>

</div>

<p class="subtitle" style="margin-top:20px">전반적인 느낌이 어떤가요? 아이콘 스타일 조정이 필요하면 말씀해주세요.</p>
